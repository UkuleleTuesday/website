name: CI

env:
  CI: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install pnpm and project dependencies
        run: npm install -g pnpm && pnpm install --ignore-scripts
      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-
      - name: Run pre-commit hooks
        run: pnpm run lint
      - name: Build static site
        env:
          ENABLE_ANALYTICS: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        run: pnpm run build
      - name: Optimize CSS
        run: pnpm run optimize-css
      - name: Optimize images (WebP + AVIF conversion)
        run: pnpm run optimize-images
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-site
          path: public/

  test:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        project: ['chromium', 'Android (Chrome, Pixel 7)', 'iOS (Mobile Safari, iPhone 13)']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: public-site
          path: public/
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm && pnpm install --ignore-scripts
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        run: pnpm run test --project "${{ matrix.project }}"
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

  deploy-preview:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      deploy_url: ${{ steps.netlify_deploy.outputs.NETLIFY_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: public-site
          path: public/
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-${{ runner.os }}-netlify-cli
          restore-keys: |
            npm-global-${{ runner.os }}-
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      - name: Set Netlify Env Vars
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify env:set WHATSAPP_JOIN_LINK "${{ secrets.WHATSAPP_JOIN_LINK }}" --context deploy-preview --secret
          netlify env:set WHATSAPP_JOIN_LINK "${{ secrets.WHATSAPP_JOIN_LINK }}" --context "branch:${{ github.head_ref }}" --secret
          netlify env:set GOOGLE_CALENDAR_API_KEY "${{ secrets.GOOGLE_CALENDAR_API_KEY }}" --context deploy-preview --secret
          netlify env:set GOOGLE_CALENDAR_API_KEY "${{ secrets.GOOGLE_CALENDAR_API_KEY }}" --context "branch:${{ github.head_ref }}" --secret
          netlify env:set BMC_URL "https://buymeacoffee.com/ukuleletuesday" --context deploy-preview
          netlify env:set BMC_URL "https://buymeacoffee.com/ukuleletuesday" --context "branch:${{ github.head_ref }}"
          netlify env:set BMC_DEFAULT_UTMS "utm_source=screen&utm_medium=qr&utm_campaign=donate" --context deploy-preview
          netlify env:set BMC_DEFAULT_UTMS "utm_source=screen&utm_medium=qr&utm_campaign=donate" --context "branch:${{ github.head_ref }}"
      - name: Deploy to Netlify
        id: netlify_deploy
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          # Run the deploy command and capture output to a temporary file while still showing it
          netlify deploy --dir=./public --message "Deploy preview for PR #${{ github.event.number }}" --json | tee netlify_output.json
          
          # Extract the deploy URL from the JSON output
          DEPLOY_URL=$(jq -r '.deploy_url' netlify_output.json)
          echo "NETLIFY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
          
          # Clean up the temporary file
          rm netlify_output.json
          
          # Also display the deploy URL for visibility
          echo "Deploy URL: $DEPLOY_URL"
      - name: Post Netlify preview link to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment_marker = "<!-- NETLIFY_PREVIEW_COMMENT -->";
            const previewUrl = `${{ steps.netlify_deploy.outputs.NETLIFY_URL }}`;
            const commentBody = `
              ${comment_marker}
              ## ✅ Netlify Deploy Preview Ready!
              You can view the live preview of your changes here:
              **[${previewUrl}](${previewUrl})**
              ---
              _Build logs are available in the [GitHub Actions summary](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})._
            `;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing_comment = comments.find(comment => comment.body.includes(comment_marker));
            if (existing_comment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing_comment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody,
              });
            }

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: public-site
          path: public/
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies and http-server
        run: npm install -g @lhci/cli@0.15.1 http-server
      - name: Start local server
        run: |
          http-server ./public -p 3000 --gzip &
          echo $! > /tmp/server.pid
          sleep 2
      - name: Run Lighthouse CI
        id: lhci
        continue-on-error: true
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_ROOT_RUN_URL: http://localhost:3000
      - name: Stop local server
        if: always()
        run: kill $(cat /tmp/server.pid) || true

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: "github.ref == 'refs/heads/main' && github.event_name == 'push'"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: public-site
          path: public/
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-${{ runner.os }}-netlify-cli
          restore-keys: |
            npm-global-${{ runner.os }}-
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
      - name: Set Netlify Env Var for Production
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify env:set WHATSAPP_JOIN_LINK "${{ secrets.WHATSAPP_JOIN_LINK }}" --context production --secret
          netlify env:set GOOGLE_CALENDAR_API_KEY "${{ secrets.GOOGLE_CALENDAR_API_KEY }}" --context production --secret
          netlify env:set BMC_URL "https://buymeacoffee.com/ukuleletuesday" --context production
          netlify env:set BMC_DEFAULT_UTMS "utm_source=screen&utm_medium=qr&utm_campaign=donate" --context production
      - name: Deploy to Netlify
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_MSG_SANITIZED=$(echo "$COMMIT_MSG" | sed "s/[^a-zA-Z0-9 :_.-]/ /g")
          netlify deploy --dir=./public --prod-if-unlocked --message "Production deploy: ${COMMIT_MSG_SANITIZED}"
