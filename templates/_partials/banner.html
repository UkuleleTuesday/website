<div class="content-row row-fill {{ banner_class }}"
     data-vc-full-width="true"
     style="background-image: linear-gradient(rgba(102,2,60,0.75), rgba(102,2,60,0.75)), url({{ banner_image_url }});
            background-image: linear-gradient(rgba(102,2,60,0.75), rgba(102,2,60,0.75)), image-set(url('{{ banner_image_url | replace('.jpg', '.avif') }}') type('image/avif'), url('{{ banner_image_url | replace('.jpg', '.webp') }}') type('image/webp'), url('{{ banner_image_url }}') type('image/jpeg'));
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover">
  <div class="col col-12">
    <div class="col-inner">
      <div class="col-content">
        <h1 class="text-normal section-heading"
            data-max_size=""
            data-min_size="60px"
            style="color: #ffffff;
                   text-align: center;
                   letter-spacing:0px">{{ banner_title | safe }}</h1>
        {% block banner_extra_content %}{% endblock %}
      </div>
    </div>
  </div>
  <div class="tt-shape tt-shape-top" data-negative="false"></div>
  <div class="tt-shape tt-shape-bottom" data-negative="false"></div>
</div>
